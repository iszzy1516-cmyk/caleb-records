<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caleb Records — Staff Desktop</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <img src="assets/caleb-logo.jpg" alt="Caleb University" class="logo" />
      <div class="header-text">
        <h1>Caleb University</h1>
        <p>Records Management — Staff Portal</p>
      </div>
    </header>

    <main class="main">
      <section class="status-grid">
        <div class="status-card" id="backend-card">
          <div class="status-dot" id="backend-dot"></div>
          <div class="status-info">
            <h3>Backend API</h3>
            <p id="backend-status">Checking...</p>
            <span class="status-url">141.147.48.186</span>
          </div>
        </div>
      </section>

      <section class="actions">
        <button class="btn btn-staff" id="btn-staff">
          <span class="icon">🛡</span> Open Staff Portal
        </button>
      </section>
    </main>

    <footer class="footer">
      <p>© 2024 Caleb University. All rights reserved.</p>
      <p class="version">v1.0.0</p>
    </footer>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
