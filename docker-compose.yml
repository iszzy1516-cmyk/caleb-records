services:
  db:
    image: postgres:16-alpine
    container_name: culrecords-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-calebrecords}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-calebrecords}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-calebrecords} -d ${DB_NAME:-calebrecords}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - culrecords-net

  backend:
    build: ./backend
    container_name: culrecords-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${DB_USER:-calebrecords}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-calebrecords}}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-noreply@calebuniversity.edu.ng}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - culrecords-net

  student-frontend:
    build: ./frontend
    container_name: culrecords-student-ui
    restart: unless-stopped
    networks:
      - culrecords-net

  staff-frontend:
    build: ./frontend-staff
    container_name: culrecords-staff-ui
    restart: unless-stopped
    networks:
      - culrecords-net

  nginx:
    image: nginx:alpine
    container_name: culrecords-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/app/uploads:ro
    depends_on:
      - backend
      - student-frontend
      - staff-frontend
    networks:
      - culrecords-net

volumes:
  postgres_data:
  uploads_data:

networks:
  culrecords-net:
    driver: bridge
