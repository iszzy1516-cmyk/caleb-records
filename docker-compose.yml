services:
  db:
    image: postgres:16-alpine
    container_name: culrecords-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-calebrecords}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-calebrecords}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - culrecords-net

  backend:
    build: ./backend
    container_name: culrecords-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${DB_USER:-calebrecords}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-calebrecords}}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8089}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-noreply@calebuniversity.edu.ng}
      VISION_PROVIDER: ${VISION_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-vl-max}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      OVH_QWEN_BASE_URL: ${OVH_QWEN_BASE_URL:-https://oai.endpoints.kepler.ai.cloud.ovh.net/v1}
      OVH_QWEN_API_KEY: ${OVH_QWEN_API_KEY:-none}
      VISION_VERIFY_UPLOADS: ${VISION_VERIFY_UPLOADS:-true}
      VISION_REJECT_ON_FAILURE: ${VISION_REJECT_ON_FAILURE:-true}
      VISION_MIN_CONFIDENCE: ${VISION_MIN_CONFIDENCE:-0.7}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - culrecords-net

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: culrecords-proxy
    restart: unless-stopped
    ports:
      - "8089:80"
      - "8443:443"
    volumes:
      - uploads_data:/app/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - culrecords-net

volumes:
  postgres_data:
  uploads_data:

networks:
  culrecords-net:
    driver: bridge
