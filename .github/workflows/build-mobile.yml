name: Build Mobile App

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.11718014"

      - name: Install Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Configure Android linkers
        run: |
          NDK="${ANDROID_SDK_ROOT}/ndk/27.0.11718014/toolchains/llvm/prebuilt/linux-x86_64/bin"
          mkdir -p src-tauri/.cargo
          cat > src-tauri/.cargo/config.toml << CARGOCONF
          [target.aarch64-linux-android]
          linker = "$NDK/aarch64-linux-android24-clang"
          [target.armv7-linux-androideabi]
          linker = "$NDK/armv7a-linux-androideabi24-clang"
          [target.i686-linux-android]
          linker = "$NDK/i686-linux-android24-clang"
          [target.x86_64-linux-android]
          linker = "$NDK/x86_64-linux-android24-clang"
          CARGOCONF

      - name: Install frontend dependencies
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ^2.0

      - name: Init Android project
        run: cargo tauri android init

      - name: Patch Gradle for universal APK
        run: |
          python3 << 'PYEOF'
          import os
          gradle = 'src-tauri/gen/android/app/build.gradle.kts'
          with open(gradle, 'r') as f:
              content = f.read()
          
          splits = '''
          \n    splits {
        abi {
            isEnable = true
            reset()
            include("armeabi-v7a", "arm64-v8a", "x86", "x86_64")
            isUniversalApk = true
        }
    }\n'''
          
          # Insert before the last closing brace of the android block
          # Find the android { block and insert before its closing }
          lines = content.split('\n')
          depth = 0
          in_android = False
          insert_idx = -1
          for i, line in enumerate(lines):
              if 'android {' in line:
                  in_android = True
              if in_android:
                  depth += line.count('{') - line.count('}')
                  if depth == 0 and '}' in line:
                      insert_idx = i
                      break
          
          if insert_idx > 0:
              lines.insert(insert_idx, splits)
              with open(gradle, 'w') as f:
                  f.write('\n'.join(lines))
              print('Patched build.gradle.kts for universal APK')
          else:
              print('Could not find android block, appending at end')
              with open(gradle, 'a') as f:
                  f.write('\nandroid {' + splits + '}\n')
          PYEOF

      - name: Build APK
        run: cargo tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.11718014

      - name: List APKs
        run: find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
