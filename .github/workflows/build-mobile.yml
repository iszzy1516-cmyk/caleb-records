name: Build Mobile App

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Find NDK path
        run: |
          NDK_PATH=$(find "$ANDROID_SDK_ROOT/ndk" -maxdepth 1 -type d | sort -V | tail -1)
          echo "NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"
          echo "Found NDK at: $NDK_PATH"
          ls -la "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/" | grep clang

      - name: Install Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Configure Android linkers
        run: |
          NDK="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          mkdir -p src-tauri/.cargo
          printf '[target.aarch64-linux-android]\nlinker = "%s/aarch64-linux-android24-clang"\n[target.armv7-linux-androideabi]\nlinker = "%s/armv7a-linux-androideabi24-clang"\n[target.i686-linux-android]\nlinker = "%s/i686-linux-android24-clang"\n[target.x86_64-linux-android]\nlinker = "%s/x86_64-linux-android24-clang"\n' "$NDK" "$NDK" "$NDK" "$NDK" > src-tauri/.cargo/config.toml
          cat src-tauri/.cargo/config.toml

      - name: Install frontend dependencies
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version ^2.0

      - name: Init Android project
        run: cargo tauri android init

      - name: Install Pillow
        run: pip install Pillow

      - name: Replace Android launcher icons
        run: |
          python3 -c "
          from PIL import Image
          import os, glob
          src = Image.open('public/caleb-logo.jpg').convert('RGBA')
          res = 'src-tauri/gen/android/app/src/main/res'
          sizes = {
              'mipmap-mdpi': 48,
              'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96,
              'mipmap-xxhdpi': 144,
              'mipmap-xxxhdpi': 192,
          }
          for folder, size in sizes.items():
              path = os.path.join(res, folder)
              if os.path.exists(path):
                  img = src.resize((size, size), Image.LANCZOS)
                  for name in ['ic_launcher.png', 'ic_launcher_foreground.png', 'ic_launcher_round.png']:
                      fpath = os.path.join(path, name)
                      if os.path.exists(fpath):
                          img.save(fpath)
                          print(f'Replaced {fpath}')
          print('Android icons replaced')
          "

      - name: Patch Gradle for universal APK
        run: |
          python3 -c "
          import sys
          gradle = 'src-tauri/gen/android/app/build.gradle.kts'
          with open(gradle, 'r') as f:
              content = f.read()
          splits_block = '    splits {\n        abi {\n            isEnable = true\n            reset()\n            include(\"armeabi-v7a\", \"arm64-v8a\", \"x86\", \"x86_64\")\n            isUniversalApk = true\n        }\n    }\n'
          lines = content.split('\n')
          depth = 0
          in_android = False
          insert_idx = -1
          for i, line in enumerate(lines):
              if 'android {' in line:
                  in_android = True
              if in_android:
                  depth += line.count('{') - line.count('}')
                  if depth == 0 and '}' in line:
                      insert_idx = i
                      break
          if insert_idx > 0:
              lines.insert(insert_idx, splits_block)
              with open(gradle, 'w') as f:
                  f.write('\n'.join(lines))
              print('Patched build.gradle.kts')
          else:
              print('WARNING: Could not find android block')
              sys.exit(1)
          "

      - name: Build debug APK
        run: cargo tauri android build --apk --debug
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          VITE_API_URL: https://culrecords.duckdns.org

      - name: List APKs
        run: find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
