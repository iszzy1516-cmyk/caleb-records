---
- name: Deploy CU-Records backend to Render
  hosts: localhost
  gather_facts: false
  vars:
    terraform_dir: "../../terraform/render"
    api_url: ""
  tasks:
    - name: Initialize Render Terraform
      ansible.builtin.command:
        cmd: terraform init -input=false
        chdir: "{{ terraform_dir }}"
      changed_when: true

    - name: Apply Render Terraform
      ansible.builtin.command:
        cmd: terraform apply -auto-approve -input=false
        chdir: "{{ terraform_dir }}"
      changed_when: true
      register: tf_apply

    - name: Extract API URL from Terraform output
      ansible.builtin.command:
        cmd: terraform output -raw api_url
        chdir: "{{ terraform_dir }}"
      changed_when: false
      register: api_url_raw

    - name: Set API URL fact
      ansible.builtin.set_fact:
        api_url: "{{ api_url_raw.stdout }}"

    - name: Wait for backend health endpoint
      ansible.builtin.uri:
        url: "{{ api_url }}/health"
        method: GET
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 15
      delay: 20

    - name: Print deployment URLs
      ansible.builtin.debug:
        msg:
          - "Backend API: {{ api_url }}"
          - "Student portal: https://culrecords-student.pages.dev"
          - "Staff portal: https://culrecords-staff.pages.dev"
          - "Health check: {{ health_check.json }}"
