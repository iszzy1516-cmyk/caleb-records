# Render Blueprint for CU-Records
# Deploy: New → Blueprint in the Render dashboard, select this repo.
services:
  - type: web
    name: culrecords-api
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: culrecords-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://culrecords-student.pages.dev,https://culrecords-staff.pages.dev,https://tauri.localhost,tauri://localhost,http://localhost:5173,http://localhost:5174,http://localhost:8000"
      - key: FRONTEND_URL
        value: "https://culrecords-student.pages.dev"
      - key: UPLOAD_DIR
        value: "/app/uploads"
      - key: MAX_FILE_SIZE
        value: "10485760"
      - key: S3_UPLOAD_BUCKET
        value: "culrecords-uploads"
      - key: AWS_REGION
        value: "auto"
      - key: VISION_PROVIDER
        value: "dashscope"
      - key: VISION_VERIFY_UPLOADS
        value: "false"
      - key: VISION_REJECT_ON_FAILURE
        value: "false"
      - key: VISION_MIN_CONFIDENCE
        value: "0.7"
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: DASHSCOPE_BASE_URL
        value: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
      - key: DASHSCOPE_MODEL
        value: "qwen-vl-max"
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: "noreply@calebuniversity.edu.ng"

databases:
  - name: culrecords-db
    plan: free
    databaseName: calebrecords
    user: calebrecords
    postgresMajorVersion: "16"
