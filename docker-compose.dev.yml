# Local development with separate ports for student and staff apps
# Student:  http://localhost:8080/
# Staff:    http://localhost:8081/staff/
# API:      http://localhost:8000

services:
  db:
    image: postgres:16-alpine
    container_name: culrecords-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-calebrecords}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-calebrecords}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-calebrecords} -d ${DB_NAME:-calebrecords}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - culrecords-net

  backend:
    build: ./backend
    container_name: culrecords-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${DB_USER:-calebrecords}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-calebrecords}}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: "http://localhost:8080,http://localhost:8081,http://localhost:8000,https://tauri.localhost"
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-noreply@calebuniversity.edu.ng}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - culrecords-net

  student-frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: culrecords-student-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - culrecords-net

  staff-frontend:
    build:
      context: ./frontend-staff
      args:
        VITE_API_URL: http://localhost:8000
    container_name: culrecords-staff-ui
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - culrecords-net

volumes:
  postgres_data:
  uploads_data:

networks:
  culrecords-net:
    driver: bridge
